# =============================================================================
# ChemistryTimes — Production
#
# Self-contained deployment: Go app + MongoDB + Nginx + Certbot.
#
# First-time setup:
#   1. Set CT_DOMAIN in .env (e.g. ct.example.com)
#   2. Run: ./init-ssl.sh
#   3. IMAGE_TAG=<tag> docker compose -f docker-compose.prod.yml up -d
#
# Renewal: certbot container auto-renews every 12h; nginx reloads every 6h.
# =============================================================================

services:
  app:
    image: ${REGISTRY:-your-dockerhub-user}/chemistry-times:${IMAGE_TAG}
    platform: linux/amd64
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ct-app
    env_file: .env
    environment:
      - MONGO_URI=mongodb://ct-mongo:27017
      - DB_NAME=chemistrytimes
      - PORT=17171
      - GIN_MODE=release
    volumes:
      - ./web/static/articles:/app/web/static/articles
    depends_on:
      mongo:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - ct-network

  mongo:
    image: mongo:7
    container_name: ct-mongo
    volumes:
      - ct-mongo-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 15s
    restart: unless-stopped
    networks:
      - ct-network

  nginx:
    image: nginx:alpine
    container_name: ct-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/ct.conf:/etc/nginx/conf.d/default.conf:ro
      - ./certbot/conf:/etc/letsencrypt:ro
      - ./certbot/www:/var/www/certbot:ro
    depends_on:
      - app
    restart: unless-stopped
    networks:
      - ct-network
    # Reload nginx every 6h to pick up renewed certificates
    command: "/bin/sh -c 'nginx -g \"daemon off;\" & while :; do sleep 6h; nginx -s reload; done'"

  certbot:
    image: certbot/certbot
    container_name: ct-certbot
    volumes:
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    # Check for renewal every 12h
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew --quiet; sleep 12h & wait $${!}; done'"
    restart: unless-stopped

volumes:
  ct-mongo-data:
    driver: local

networks:
  ct-network:
    driver: bridge
