# Initial nginx config — used BEFORE SSL certificates exist for CT.
# Only serves the ACME challenge for Let's Encrypt.
# After certificates are obtained, merge ct.conf into cddn's nginx.conf.

server {
    listen 80 default_server;
    server_name _;
    return 444;
}

server {
    listen 80;
    server_name CT_DOMAIN;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 200 'ChemistryTimes — waiting for SSL certificate...';
        add_header Content-Type text/plain;
    }
}
