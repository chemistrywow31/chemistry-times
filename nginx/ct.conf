# =============================================================================
# ct.conf — Nginx config for ChemistryTimes
#
# Replace CT_DOMAIN with your actual domain (e.g. ct.example.com).
# Used by docker-compose.prod.yml — mounted as /etc/nginx/conf.d/default.conf.
# =============================================================================

upstream ct-app {
    server ct-app:17171;
}

# HTTP → HTTPS redirect + ACME challenge
server {
    listen 80;
    server_name CT_DOMAIN;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS
server {
    listen 443 ssl http2;
    server_name CT_DOMAIN;

    ssl_certificate /etc/letsencrypt/live/CT_DOMAIN/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/CT_DOMAIN/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    # Security headers
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Allow iframe embedding (CT uses iframe for articles)
    # Do NOT set X-Frame-Options here — articles are viewed via iframe

    client_max_body_size 20M;

    # All CT routes (Go app handles both /chemistry-times and /chemistry-game-times)
    location / {
        proxy_pass http://ct-app;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Static assets — long cache
    location /chemistry-times/static/ {
        proxy_pass http://ct-app;
        proxy_set_header Host $host;
        expires 7d;
        add_header Cache-Control "public";
    }

    location /chemistry-game-times/static/ {
        proxy_pass http://ct-app;
        proxy_set_header Host $host;
        expires 7d;
        add_header Cache-Control "public";
    }
}
