# ChemistryTimes TTS Configuration
# This file configures the text-to-speech provider for English Learning mode.
# The active provider is set by the `provider` field under `tts`.
# Add new providers under `providers` to support future expansion.

tts:
  provider: openai

  providers:
    openai:
      model: tts-1
      voice: alloy
      format: mp3
      speed: 0.9
      # Available voices: alloy, echo, fable, onyx, nova, shimmer
      # speed range: 0.25 to 4.0 (0.9 is slightly slower for learners)

    # Future providers — uncomment and configure when ready:
    #
    # azure:
    #   endpoint: https://{region}.tts.speech.microsoft.com/
    #   voice: en-US-JennyNeural
    #   format: mp3
    #   speed: 0.9
    #
    # google:
