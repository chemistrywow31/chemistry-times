version: "3.3"

services:
  app:
    build: .
    ports:
      - "17171:17171"
    env_file: .env
    environment:
      - MONGO_URI=mongodb://mongo:27017
      - GIN_MODE=release
    volumes:
      - ./web/static/articles:/app/web/static/articles
    depends_on:
      - mongo
    restart: unless-stopped

  mongo:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  mongo_data:
