<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ChemistryGameTimes 遊戲時報</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎮</text></svg>">
    <link rel="stylesheet" href="/chemistry-game-times/static/css/game-style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;600;700&family=Noto+Serif+TC:wght@700;800&display=swap" rel="stylesheet">
</head>
<body>
    <!-- Header -->
    <header class="header">
        <div class="header-brand">
            <h1 class="header-title">ChemistryGameTimes</h1>
            <span class="header-subtitle">遊戲時報</span>
        </div>
        <div class="header-meta">
            <span class="header-date" id="currentDate"></span>
        </div>
    </header>

    <div class="layout">
        <!-- Sidebar -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <h2 class="sidebar-title">文章列表</h2>
            </div>
            <div class="article-list" id="articleList">
                <!-- Articles populated by JS -->
            </div>
            <div class="pagination" id="pagination">
                <!-- Pagination populated by JS -->
            </div>
        </aside>

        <!-- Main Content -->
        <main class="content">
            <div class="welcome" id="welcomeScreen">
                <div class="welcome-icon">🎮</div>
                <h2>歡迎來到遊戲時報</h2>
                <p>從左側選擇一篇文章開始閱讀</p>
            </div>
            <iframe id="articleFrame" class="article-frame" style="display:none;"></iframe>
        </main>
    </div>

    <!-- Footer -->
    <footer class="footer">
        <span class="footer-glow"></span>
        <p>Powered by ChemistryGameTimes AI 虛擬編輯部 &copy; 2026</p>
    </footer>

    <!-- Mobile sidebar toggle -->
    <button class="sidebar-toggle" id="sidebarToggle" aria-label="Toggle sidebar">
        <span></span><span></span><span></span>
    </button>

    <script src="/chemistry-game-times/static/js/game-app.js"></script>
</body>
</html>
