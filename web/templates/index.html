<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ChemistryTimes 化學時報</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📰</text></svg>">
    <link rel="stylesheet" href="/chemistry-times/static/css/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Huninn&display=swap" rel="stylesheet">
</head>
<body data-lang="zh-tw">
    <!-- Navbar -->
    <header class="navbar">
        <div class="navbar-left">
            <span class="navbar-date" id="currentDate"></span>
            <span class="navbar-divider"></span>
            <span class="navbar-issue" id="navbarIssue"></span>
        </div>
        <div class="navbar-center">
            <span class="navbar-brand">ChemistryTimes</span>
            <span class="navbar-sub">化學時報</span>
        </div>
        <div class="navbar-right">
            <button class="theme-toggle" id="themeToggle" aria-label="Toggle theme">
                <svg class="icon-sun" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="12" cy="12" r="5"/>
                    <line x1="12" y1="1" x2="12" y2="3"/>
                    <line x1="12" y1="21" x2="12" y2="23"/>
                    <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/>
                    <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
                    <line x1="1" y1="12" x2="3" y2="12"/>
                    <line x1="21" y1="12" x2="23" y2="12"/>
                    <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/>
                    <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
                </svg>
                <svg class="icon-moon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" style="display:none;">
                    <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
                </svg>
            </button>
            <button class="lang-toggle" id="langToggle" aria-label="Switch language">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="12" cy="12" r="10"/>
                    <path d="M2 12h20"/>
                    <path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/>
                </svg>
                <span class="lang-label" id="langLabel">EN</span>
            </button>
        </div>
    </header>

    <!-- Layout: Sidebar + Content -->
    <div class="layout">
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <span class="sidebar-header-content"><span class="lang-zh-tw">所有日報</span><span class="lang-en">ALL EDITIONS</span></span>
                <button class="sidebar-collapse-btn" id="sidebarCollapseBtn" aria-label="Collapse sidebar">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                        <rect x="3" y="3" width="18" height="18" rx="2"/>
                        <line x1="9" y1="3" x2="9" y2="21"/>
                    </svg>
                </button>
            </div>
            <div class="sidebar-list-container">
                <div class="scroll-fade-top" id="scrollFadeTop"></div>
                <div class="sidebar-list" id="articleList">
                    <!-- Article items populated by JS -->
                    <div id="pagination"></div>
                </div>
                <div class="scroll-fade-bottom" id="scrollFadeBottom"></div>
            </div>
            <div class="sidebar-footer">
                <div class="pet-tank-wrapper">
                    <div class="pet-flashlight-area">
                        <button class="pet-flashlight" id="petLightSwitch" aria-label="Toggle pet tank light">
                            <svg width="24" height="12" viewBox="0 0 24 12" fill="currentColor">
                                <rect x="0" y="3.5" width="10" height="5" rx="1.5"/>
                                <rect x="10" y="1" width="8" height="10" rx="2.5"/>
                                <rect x="9" y="1.5" width="2" height="9" rx="0.5" opacity="0.5"/>
                            </svg>
                        </button>
                        <div class="pet-light-beam"></div>
                    </div>
                    <div class="pet-tank">
                        <iframe height="100%" width="100%" frameborder="0" loading="eager" allow="autoplay" src="/chemistry-times/static/hamster/index.html?up_bgColor=f9f8f6&up_bodyColor=e6debe&up_earColor=d4c898&up_snoutColor=f7f4e9&up_eyeColor=000000&up_feetColor=d4c898&up_tailColor=e6debe&up_waterColor=e0efff&up_foodColor=cba920&up_wheelColor=ffffff&up_wheelOuterColor=ff4d4d&up_wheelCenterColor=e4eb2f&up_wheelSpokeColor=dedede"></iframe>
                    </div>
                </div>
            </div>
            <!-- Collapsed state content -->
            <div class="sidebar-collapsed-content">
                <button class="sidebar-collapse-btn" id="sidebarExpandBtn" aria-label="Expand sidebar">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                        <rect x="3" y="3" width="18" height="18" rx="2"/>
                        <line x1="9" y1="3" x2="9" y2="21"/>
                    </svg>
                </button>
                <span class="sidebar-collapsed-label lang-zh-tw">日報</span><span class="sidebar-collapsed-label lang-en">EDITIONS</span>
            </div>
        </aside>

        <main class="content">
            <div class="welcome" id="welcomeScreen">
                <div class="welcome-icon">
                    <svg width="48" height="48" viewBox="0 0 48 48" fill="none" stroke="#e2e2e2" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                        <rect x="6" y="8" width="36" height="32" rx="2"/>
                        <line x1="6" y1="16" x2="42" y2="16"/>
                        <line x1="24" y1="16" x2="24" y2="40"/>
                        <line x1="12" y1="12" x2="20" y2="12"/>
                        <line x1="12" y1="22" x2="20" y2="22"/>
                        <line x1="12" y1="26" x2="20" y2="26"/>
                        <line x1="12" y1="30" x2="20" y2="30"/>
                        <line x1="12" y1="34" x2="18" y2="34"/>
                        <line x1="28" y1="22" x2="36" y2="22"/>
                        <line x1="28" y1="26" x2="36" y2="26"/>
                        <line x1="28" y1="30" x2="36" y2="30"/>
                        <line x1="28" y1="34" x2="34" y2="34"/>
                    </svg>
                </div>
                <div class="welcome-title">ChemistryTimes 化學時報</div>
                <div class="welcome-sub">Internal Daily</div>
                <div class="welcome-hint"><span class="lang-zh-tw">&larr; 從左側選擇一篇文章開始閱讀</span><span class="lang-en">&larr; Select an article from the left to start reading</span></div>
            </div>
            <iframe id="articleFrame" class="article-frame" title="Article content"></iframe>
            <div id="iframeThemeMask" class="iframe-theme-mask"></div>
        </main>
    </div>

    <!-- Footer -->
    <footer class="footer">
        <span>ChemistryTimes 化學時報</span>
        <span>&middot;</span>
        <span>&copy; 2026 ChemistryTimes. Internal use only.</span>
    </footer>

    <!-- Mobile hamburger toggle -->
    <button class="mobile-sidebar-toggle" id="mobileSidebarToggle" aria-label="Toggle article list">
        <span></span><span></span><span></span>
    </button>
    <div class="mobile-overlay" id="mobileOverlay"></div>

    <script src="/chemistry-times/static/js/app.js"></script>
</body>
</html>
