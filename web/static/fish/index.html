<!DOCTYPE html>
<html>
<head>
<style>
html, body { margin: 0; padding: 0; height: 100%; width: 100%; overflow: hidden; }
#player { width: 100%; height: 100%; }

.skeleton {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 16px;
    transition: opacity 0.6s ease;
}
.skeleton.hidden { opacity: 0; pointer-events: none; }

.skeleton-fish {
    font-size: 28px;
    animation: bob 2s ease-in-out infinite;
    opacity: 0.3;
}
.skeleton-fish:nth-child(1) { animation-delay: 0s; }
.skeleton-fish:nth-child(2) { animation-delay: 0.3s; }
.skeleton-fish:nth-child(3) { animation-delay: 0.6s; }

.skeleton-dots {
    font-size: 14px;
    color: #aaa;
    letter-spacing: 2px;
}
.skeleton-dots span {
    animation: fade 1.4s ease-in-out infinite;
}
.skeleton-dots span:nth-child(2) { animation-delay: 0.2s; }
.skeleton-dots span:nth-child(3) { animation-delay: 0.4s; }

@keyframes bob {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-8px); }
}
@keyframes fade {
    0%, 100% { opacity: 0.2; }
    50% { opacity: 1; }
}
</style>
</head>
<body>
<div class="skeleton" id="skeleton">
    <div class="skeleton-fish">🐟</div>
    <div class="skeleton-fish">🐟</div>
    <div class="skeleton-fish">🐟</div>
    <div class="skeleton-dots"><span>.</span><span>.</span><span>.</span></div>
</div>
<div id="player"></div>
<script>
window.RufflePlayer = window.RufflePlayer || {};
window.RufflePlayer.config = {
    "autoplay": "on",
    "unmuteOverlay": "hidden",
    "splashScreen": false,
    "preloader": false
};
</script>
<script src="https://unpkg.com/@ruffle-rs/ruffle"></script>
<script>
document.addEventListener("DOMContentLoaded", () => {
    const ruffle = window.RufflePlayer.newest();
    const player = ruffle.createPlayer();
    player.style.width = "100%";
    player.style.height = "100%";
    document.getElementById("player").appendChild(player);

    const params = new URLSearchParams(window.location.search);
    const bg = params.get("up_backgroundColor") || "f9f8f6";

    document.body.style.backgroundColor = "#" + bg;

    player.load({
        url: "fish.swf",
        parameters: Object.fromEntries(params.entries()),
        autoplay: "on",
        backgroundColor: "#" + bg
    }).then(() => {
        document.getElementById("skeleton").classList.add("hidden");
    });
});
</script>
</body>
</html>
